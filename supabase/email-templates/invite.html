<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You’re invited to Reading Queue</title>
  <style>
    body, table, td { margin: 0; padding: 0; border: 0; }
    @media only screen and (max-width: 600px) {
      .email-card { border-radius: 16px !important; }
      .email-body { padding: 36px 28px !important; }
      .email-footer { padding: 18px 28px 26px !important; }
      .email-outer { padding: 24px 12px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#f2ebe3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;">
  <table width="100%" role="presentation">
    <tr>
      <td class="email-outer" align="center" style="padding:48px 16px;">
        <table width="100%" role="presentation" style="max-width:520px;">

          <tr>
            <td align="center" style="padding-bottom:32px;">
              <span style="font-size:12px;font-weight:700;letter-spacing:.22em;color:#7a6555;text-transform:uppercase;">Reading Queue</span>
            </td>
          </tr>

          <tr>
            <td class="email-card" style="background:#ffffff;border-radius:22px;border:1px solid #e5d9ce;box-shadow:0 8px 40px rgba(90,60,30,.10);overflow:hidden;">
              <div style="height:5px;background:linear-gradient(90deg,#ccb08c 0%,#b08d6a 50%,#8b6343 100%);"></div>

              <table width="100%" role="presentation">
                <tr>
                  <td class="email-body" style="padding:48px 48px 36px;">
                    <h1 style="margin:0 0 10px;font-size:26px;font-weight:700;color:#1a1410;letter-spacing:-.015em;line-height:1.25;">
                      You’ve been invited
                    </h1>
                    <p style="margin:0 0 24px;font-size:15px;color:#6b5a4e;line-height:1.65;">
                      You’ve been invited to create a Reading Queue account.
                    </p>

                    <table role="presentation">
                      <tr>
                        <td style="border-radius:14px;background-color:#1a1410;">
                          <a href="{{ .ConfirmationURL }}"
                             target="_blank"
                             style="display:inline-block;padding:15px 36px;font-size:14px;font-weight:600;color:#ffffff;text-decoration:none;letter-spacing:.03em;border-radius:14px;">
                            Accept invite →
                          </a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

                <tr>
                  <td class="email-footer" style="padding:20px 48px 30px;border-top:1px solid #f0e8de;">
                    <p style="margin:0;font-size:12px;color:#b8a898;line-height:1.6;">
                      Button not working? Paste this link into your browser:<br />
                      <a href="{{ .ConfirmationURL }}" style="color:#b08d6a;text-decoration:underline;word-break:break-all;">{{ .ConfirmationURL }}</a>
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
